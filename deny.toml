[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[advisories]
version = 2
# Unmaintained crates: warn only for direct workspace deps, not transitives
unmaintained = "workspace"
# Yanked crates are denied by default in v2
yanked = "deny"

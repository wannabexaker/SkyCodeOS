# Agent profiles - each profile configures model, reasoning, and permissions.
# Edit these to match your hardware and workflow.
profiles:
  precise:
    model: local-coder
    temperature: 0.1
    repeat_penalty: 1.1
    max_tokens: 2048
    context_chunks: 5
    permissions: default
  fast:
    model: local-coder-fast
    temperature: 0.2
    repeat_penalty: 1.05
    max_tokens: 1024
    context_chunks: 3
    permissions: default
  creative:
    model: local-coder
    temperature: 0.7
    repeat_penalty: 1.0
    max_tokens: 4096
    context_chunks: 8
    permissions: default
  deep:
    model: local-coder
    temperature: 0.05
    repeat_penalty: 1.15
    max_tokens: 4096
    context_chunks: 10
    permissions: default
  readonly:
    model: local-coder-fast
    temperature: 0.1
    repeat_penalty: 1.1
    max_tokens: 1024
    context_chunks: 3
    permissions: readonly
  sandbox:
    model: local-coder
    temperature: 0.1
    repeat_penalty: 1.1
    max_tokens: 2048
    context_chunks: 5
    permissions: sandbox

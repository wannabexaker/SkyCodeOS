# Agent profiles - each profile configures model, reasoning, and permissions.
# Edit these to match your hardware and workflow.
profiles:
  precise:
    model: local-coder
    temperature: 0.1
    repeat_penalty: 1.1
    max_tokens: 2048
    context_chunks: 5
    permissions: default
  fast:
    model: local-coder-fast
    temperature: 0.2
    repeat_penalty: 1.05
    max_tokens: 1024
    context_chunks: 3
    permissions: default
  creative:
    model: local-coder
    temperature: 0.7
    repeat_penalty: 1.0
    max_tokens: 4096
    context_chunks: 8
    permissions: default
  deep:
    model: local-coder
    temperature: 0.05
    repeat_penalty: 1.15
    max_tokens: 4096
    context_chunks: 10
    permissions: default
  readonly:
    model: local-coder-fast
    temperature: 0.1
    repeat_penalty: 1.1
    max_tokens: 1024
    context_chunks: 3
    permissions: readonly
  sandbox:
    model: local-coder
    temperature: 0.1
    repeat_penalty: 1.1
    max_tokens: 2048
    context_chunks: 5
    permissions: sandbox
  experimental:
    model: local-coder
    temperature: 0.4
    repeat_penalty: 1.05
    max_tokens: 3072
    context_chunks: 6
    permissions: default
    # Phase 10B fields - exercise the full sampling surface
    top_k: 50
    top_p: 0.92
    min_p: 0.05
    repeat_last_n: 128
    presence_penalty: 0.1
    frequency_penalty: 0.1
    dry_multiplier: 0.6
    dry_base: 1.75
    dry_allowed_length: 2
